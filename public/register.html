<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – ShopHub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">Shop<span>Hub</span></div>
    <p class="auth-subtitle">Create your free account</p>

    <div id="auth-error" class="auth-error hidden"></div>

    <form id="register-form" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="fullname">Full name</label>
        <input class="form-input" type="text" id="fullname" name="fullname"
               placeholder="John Doe" required autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Min. 6 characters" required autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm password</label>
        <input class="form-input" type="password" id="confirm_password" name="confirm_password"
               placeholder="Repeat your password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
        Create Account
      </button>
    </form>

    <div class="auth-link-row">
      Already have an account? <a href="/login.html">Sign in</a>
    </div>
    <div class="auth-link-row" style="margin-top:8px">
      <a href="/">← Back to shop</a>
    </div>
  </div>
</main>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
