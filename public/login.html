<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In – ShopHub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<main class="auth-page">
  <div class="auth-box">
    <div class="auth-logo">Shop<span>Hub</span></div>
    <p class="auth-subtitle">Sign in to your account</p>

    <div id="auth-error" class="auth-error hidden"></div>

    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-input" type="email" id="email" name="email"
               placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-input" type="password" id="password" name="password"
               placeholder="Enter your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
        Sign In
      </button>
    </form>

    <div class="auth-link-row">
      Don't have an account? <a href="/register.html">Create one</a>
    </div>
    <div class="auth-link-row" style="margin-top:8px">
      <a href="/">← Back to shop</a>
    </div>

    <div style="margin-top:24px;padding:14px;background:var(--card);border-radius:var(--radius-sm);font-size:.8rem;color:var(--text-muted)">
      <strong style="color:var(--primary)">Admin demo</strong><br>
      Email: admin@shophub.com<br>Password: admin123
    </div>
  </div>
</main>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
