<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopHub – Online Shopping Center</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ─── Navbar ──────────────────────────────── -->
<nav class="navbar">
  <div class="container">
    <a href="/" class="nav-logo">Shop<span>Hub</span></a>

    <div class="nav-search">
      <input type="text" id="nav-search-input" placeholder="Search products…">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>

    <div class="nav-actions">
      <!-- Cart -->
      <a href="/cart.html" class="nav-btn cart-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        Cart
        <span class="cart-count" id="cart-count" style="display:none">0</span>
      </a>

      <!-- Not logged in -->
      <a href="/login.html" class="btn btn-primary btn-sm" id="nav-login-btn">Sign In</a>

      <!-- Logged in -->
      <div id="nav-user-menu" style="display:none;align-items:center;gap:8px;">
        <span id="nav-admin-link" style="display:none">
          <a href="/admin.html" class="btn btn-outline btn-sm">Admin</a>
        </span>
        <span class="text-muted" style="font-size:.85rem">
          Hi, <strong id="nav-user-name"></strong>
        </span>
        <button class="btn btn-ghost btn-sm" id="nav-logout-btn">Log out</button>
      </div>
    </div>
  </div>
</nav>

<!-- ─── Hero ────────────────────────────────── -->
<section class="hero">
  <div class="container">
    <div class="hero-tag">🛍️ New Arrivals Every Week</div>
    <h1>Shop Smarter,<br>Live <span>Better</span></h1>
    <p>Discover thousands of products at unbeatable prices — delivered to your door.</p>
  </div>
</section>

<!-- ─── Shop Section ─────────────────────────── -->
<section style="padding: 0 0 80px;">
  <div class="container">
    <!-- Category Filter -->
    <div id="category-filter" class="category-filter"></div>

    <!-- Product Grid -->
    <div id="product-grid" class="product-grid"></div>
  </div>
</section>

<!-- ─── Product Detail Modal ─────────────────── -->
<div class="modal-overlay hidden" id="product-modal">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-name">Product</h3>
      <button class="modal-close" id="close-product-modal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;align-items:start;">
      <img id="modal-img" src="" alt="" style="width:100%;border-radius:12px;object-fit:cover;aspect-ratio:1">
      <div style="display:flex;flex-direction:column;gap:16px;">
        <span class="badge badge-blue" id="modal-cat"></span>
        <p style="color:var(--text-muted);font-size:.9rem;line-height:1.6" id="modal-desc"></p>
        <div style="font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--primary)" id="modal-price"></div>
        <div style="font-size:.8rem;color:var(--text-muted)" id="modal-stock"></div>
        <button class="btn btn-primary btn-lg" id="modal-add-btn">Add to Cart 🛒</button>
      </div>
    </div>
  </div>
</div>

<!-- ─── Footer ──────────────────────────────── -->
<footer>
  <div class="container">
    <p><strong>ShopHub</strong> &nbsp;|&nbsp; ATI Kegalle HND IT Project &nbsp;|&nbsp; R.D.E Jayarathna – KEG/IT/2324/F/8</p>
  </div>
</footer>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/main.js"></script>
</body>
</html>
