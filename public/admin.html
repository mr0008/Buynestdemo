<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel – ShopHub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="admin-layout">

  <!-- ─── Sidebar ────────────────────────────── -->
  <aside class="admin-sidebar">
    <div class="sidebar-logo">Shop<span>Hub</span></div>

    <div class="sidebar-label">Main</div>
    <button class="sidebar-link active">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      Dashboard
    </button>
    <button class="sidebar-link" onclick="window.location.href='/'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      View Shop
    </button>

    <div class="sidebar-label" style="margin-top:12px">Account</div>
    <button class="sidebar-link" id="admin-logout-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Log Out
    </button>
  </aside>

  <!-- ─── Main Content ─────────────────────────── -->
  <main class="admin-main">
    <div class="admin-header">
      <h1 class="admin-title">Admin Dashboard</h1>
      <p class="admin-subtitle">Welcome back, <strong id="admin-name"></strong></p>
    </div>

    <!-- Stat Cards -->
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-icon">📦</div>
        <div class="stat-label">Total Products</div>
        <div class="stat-value" id="stat-products">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🏷️</div>
        <div class="stat-label">Categories</div>
        <div class="stat-value" id="stat-categories">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-label">Total Stock</div>
        <div class="stat-value" id="stat-stock">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-label">Total Value</div>
        <div class="stat-value" id="stat-value">—</div>
      </div>
    </div>

    <!-- Products Table -->
    <div class="table-wrap">
      <div class="table-toolbar">
        <div class="table-title">Products</div>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <input class="form-input" id="admin-search" placeholder="Search products…"
                 style="width:220px;padding:8px 12px">
          <button class="btn btn-primary btn-sm" id="add-product-btn">+ Add Product</button>
        </div>
      </div>
      <div style="overflow-x:auto">
        <table>
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-muted)">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- ─── Add / Edit Product Modal ────────────── -->
<div class="modal-overlay hidden" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title-text">Add Product</h3>
      <button class="modal-close" id="close-modal-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <form id="product-form" class="modal-form">
      <div class="form-group">
        <label class="form-label">Product Name *</label>
        <input class="form-input" name="prod_name" placeholder="e.g. Wireless Headphones" required>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-input" name="prod_desc" placeholder="Product description…"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Price (USD) *</label>
          <input class="form-input" name="prod_price" type="number" step="0.01" min="0" placeholder="0.00" required>
        </div>
        <div class="form-group">
          <label class="form-label">Stock</label>
          <input class="form-input" name="prod_stock" type="number" min="0" placeholder="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Category</label>
        <input class="form-input" name="prod_category" placeholder="e.g. Electronics">
      </div>
      <div class="form-group">
        <label class="form-label">Image URL</label>
        <input class="form-input" name="prod_image" type="url"
               placeholder="https://images.unsplash.com/…">
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
        <button type="button" class="btn btn-ghost" id="cancel-modal-btn">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Product</button>
      </div>
    </form>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
