<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cart – ShopHub</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ─── Navbar ──────────────────────────────── -->
<nav class="navbar">
  <div class="container">
    <a href="/" class="nav-logo">Shop<span>Hub</span></a>
    <div class="nav-actions">
      <a href="/cart.html" class="nav-btn cart-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        Cart <span class="cart-count" id="cart-count" style="display:none">0</span>
      </a>
      <a href="/" class="btn btn-outline btn-sm">← Shop</a>
      <div id="nav-user-menu" style="display:none;align-items:center;gap:8px">
        <span style="font-size:.85rem;color:var(--text-muted)">Hi, <strong id="nav-user-name"></strong></span>
        <button class="btn btn-ghost btn-sm" id="nav-logout-btn">Log out</button>
      </div>
      <a href="/login.html" class="btn btn-primary btn-sm" id="nav-login-btn">Sign In</a>
    </div>
  </div>
</nav>

<!-- ─── Cart Content ─────────────────────────── -->
<main class="cart-page">
  <div class="container">
    <div class="section-header">
      <h1 class="section-title">My <span>Cart</span></h1>
      <span id="item-count" class="text-muted"></span>
    </div>

    <!-- Empty state -->
    <div id="cart-empty" class="empty-state hidden">
      <div class="icon">🛒</div>
      <h3>Your cart is empty</h3>
      <p>Add some products to get started</p>
      <a href="/" class="btn btn-primary" style="margin-top:20px">Browse Products</a>
    </div>

    <div class="cart-layout">
      <!-- Items -->
      <div>
        <div id="cart-list"></div>
        <button id="clear-cart-btn" class="btn btn-ghost btn-sm" style="margin-top:16px;color:var(--danger)">
          Clear cart
        </button>
      </div>

      <!-- Summary -->
      <div id="cart-summary" class="cart-summary hidden">
        <h3 class="summary-title">Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span id="shipping">$5.00</span>
        </div>
        <div class="summary-row" style="font-weight:700;font-size:1.05rem;border-top:1px solid var(--border-light);padding-top:12px;margin-top:4px">
          <span>Total</span>
          <span id="cart-total" class="summary-total">$0.00</span>
        </div>
        <button id="checkout-btn" class="btn btn-primary btn-full btn-lg" style="margin-top:20px">
          Checkout →
        </button>
        <a href="/" class="btn btn-ghost btn-full" style="margin-top:8px">Continue Shopping</a>
      </div>
    </div>
  </div>
</main>

<footer>
  <div class="container">
    <p><strong>ShopHub</strong> &nbsp;|&nbsp; ATI Kegalle HND IT Project</p>
  </div>
</footer>

<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script src="/js/cart.js"></script>
</body>
</html>
